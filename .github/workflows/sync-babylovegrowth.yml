name: Sync BabyLoveGrowth Resources

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: write

jobs:
  sync:
    name: Fetch and publish BabyLoveGrowth articles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync BabyLoveGrowth articles
        env:
          BABYLOVE_API_KEY: ${{ secrets.BABYLOVE_API_KEY }}
        run: node scripts/sync-babylovegrowth.mjs

      - name: Commit generated resource updates
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No BabyLoveGrowth resource changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources sitemap.xml llms.txt
          git commit -m "Sync BabyLoveGrowth resource articles"
          git push
